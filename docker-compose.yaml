services:
  hexstrike-ai:
    build:
      context: .
      dockerfile: pentest-lab/Dockerfile
    container_name: hexstrike_gemini_lab
    image: mvp-hex-ai:latest
    
    # Privilégios elevados para scans de rede (Nmap, etc)
    privileged: true
    
    # Modo host permite alcançar as máquinas do TryHackMe via sua VPN local
    network_mode: host
    
    # Garante interatividade para o comando gemini-cli
    stdin_open: true
    tty: true

    volumes:
      # Pasta para seus códigos, logs de pentest e o bridge.py
      - ./workdir:/root/pentest
      
      # Persistência das configurações (API Keys, preferências do Gemini-CLI)
      # No Linux/Mac, o Gemini-CLI costuma salvar em ~/.config/
      - ./pentest-lab/config/gemini-cli:/root/.config/gemini-terminator

    environment:
      - TERM=xterm-256color # Garante que as cores do terminal funcionem bem
      - GEMINI_API_KEY=${GEMINI_API_KEY:-} # Pode ser passada via arquivo .env

    working_dir: /root/pentest

  files:
    image: filebrowser/filebrowser
    container_name: hexstrike_files
    ports:
      - "8081:80"
    volumes:
      - ./workdir:/srv
    command: --noauth

  terminal:
    image: docker:cli
    container_name: hexstrike_terminal
    ports:
      - "7681:7681"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: sh -c
    command: >
      "apk add --no-cache ttyd &&
      ttyd -p 7681 docker exec -it hexstrike_gemini_lab /bin/bash -i"

  gui:
    build: ./gui
    container_name: hexstrike_gui
    ports:
      - "6080:6080"
    volumes:
      - ./workdir:/workspace